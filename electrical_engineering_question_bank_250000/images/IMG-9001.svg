<rect class="panel" x="24" y="500" width="912" height="74" rx="10"/>
<text x="48" y="528" font-family="Inter,Arial,sans-serif" font-size="15" fill="#1F2933">A conventional AM signal has highest modulating frequency 7 kHz. What transmission bandwidth is required?</text>
