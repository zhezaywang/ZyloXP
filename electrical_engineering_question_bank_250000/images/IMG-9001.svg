<rect x="24" y="22" width="912" height="72" rx="10" fill="#174A5B"/>
<text x="48" y="56" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">AM bandwidth problem diagram</text>
<text x="48" y="80" font-family="Inter,Arial,sans-serif" font-size="13" fill="#D6EEF2">IMG-9001 | Communications | EE-180001</text>
<line class="thin" x1="130" y1="400" x2="840" y2="400" marker-end="url(#arrow)"/>
<rect class="accentFill" x="220" y="285" width="205" height="115" rx="0"/>
<rect class="accentFill" x="535" y="285" width="205" height="115" rx="0"/>
<line class="accent" x1="480" y1="400" x2="480" y2="205"/>
<text class="small" x="322" y="270" text-anchor="middle">lower sideband</text>
<text class="small" x="638" y="270" text-anchor="middle">upper sideband</text>
<text class="small" x="480" y="188" text-anchor="middle">carrier</text>
<text class="tiny" x="220" y="424" text-anchor="middle">fc - fm,max</text>
<text class="tiny" x="480" y="424" text-anchor="middle">fc</text>
<text class="tiny" x="740" y="424" text-anchor="middle">fc + fm,max</text>
<line class="thin" x1="220" y1="458" x2="740" y2="458"/>
