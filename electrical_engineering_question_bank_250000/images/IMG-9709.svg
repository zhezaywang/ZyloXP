<circle class="accentFill" cx="690" cy="425" r="5" fill="none"/>
<text class="small" x="480" y="470" text-anchor="middle">The meter input resistance loads the source</text>
<rect class="panel" x="24" y="500" width="912" height="74" rx="10"/>
<text x="48" y="522" font-family="Inter,Arial,sans-serif" font-size="14" fill="#1F2933">A 6 V source has source resistance 20 kohm and is measured by a voltmeter of 200 kohm input resistance. What</text>
