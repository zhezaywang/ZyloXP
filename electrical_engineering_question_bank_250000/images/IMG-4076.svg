<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L8,3 z" fill="#174A5B"/>
</marker>
<style>
.wire{stroke:#174A5B;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.thin{stroke:#44606B;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.accent{stroke:#D97706;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.accentFill{fill:#FDECC8;stroke:#D97706;stroke-width:3}
.box{fill:#EAF4F4;stroke:#246B7A;stroke-width:3}
.panel{fill:#FFFFFF;stroke:#D9E2E7;stroke-width:1.5}
.soft{fill:#F1F7F8;stroke:#7AA8B2;stroke-width:2}
.label{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#1F2933}
.small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#52616B}
.tiny{font-family:Inter,Arial,sans-serif;font-size:11px;fill:#52616B}
.math{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#1F2933}
</style>
</defs>
<title id="title">Three-phase real power problem diagram</title>
<desc id="desc">A balanced three-phase load has line voltage 5 kV, line current 175 A, and power factor 0.8. What real power is delivered?</desc>
<rect x="0" y="0" width="960" height="600" fill="#F8FAFB"/>
<rect x="24" y="22" width="912" height="72" rx="10" fill="#174A5B"/>
<text x="48" y="56" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Three-phase real power problem diagram</text>
<text x="48" y="80" font-family="Inter,Arial,sans-serif" font-size="13" fill="#D6EEF2">IMG-4076 | Power Systems | EE-81501</text>
<circle class="thin" cx="155" cy="300" r="48" fill="none"/>
<text class="label" x="155" y="306" text-anchor="middle">3-PH</text>
<line class="wire" x1="203" y1="240" x2="700" y2="240" marker-end="url(#arrow)"/>
<line class="wire" x1="203" y1="300" x2="700" y2="300" marker-end="url(#arrow)"/>
<line class="wire" x1="203" y1="360" x2="700" y2="360" marker-end="url(#arrow)"/>
<text class="tiny" x="232" y="226" text-anchor="start">phase A</text>
<text class="tiny" x="232" y="286" text-anchor="start">phase B</text>
<text class="tiny" x="232" y="346" text-anchor="start">phase C</text>
<rect class="soft" x="700" y="206" width="145" height="188" rx="8"/>
<text class="small" x="772" y="294" text-anchor="middle">balanced</text>
<text class="small" x="772" y="320" text-anchor="middle">3-phase load</text>
<line class="accent" x1="425" y1="240" x2="425" y2="300" marker-end="url(#arrow)"/>
<text class="small" x="445" y="274" text-anchor="start">VL</text>
<line class="accent" x1="500" y1="220" x2="610" y2="220" marker-end="url(#arrow)"/>
<text class="small" x="555" y="202" text-anchor="middle">IL</text>
<text class="small" x="480" y="438" text-anchor="middle">RMS line quantities and load power factor</text>
<rect class="panel" x="24" y="500" width="912" height="74" rx="10"/>
<text x="48" y="522" font-family="Inter,Arial,sans-serif" font-size="14" fill="#1F2933">A balanced three-phase load has line voltage 5 kV, line current 175 A, and power factor 0.8. What real power is</text>
<text x="48" y="541" font-family="Inter,Arial,sans-serif" font-size="14" fill="#1F2933">delivered?</text>
</svg>
