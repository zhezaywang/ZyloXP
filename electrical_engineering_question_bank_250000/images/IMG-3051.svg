<rect x="24" y="22" width="912" height="72" rx="10" fill="#174A5B"/>
<text x="48" y="56" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Coulomb force problem diagram</text>
<text x="48" y="80" font-family="Inter,Arial,sans-serif" font-size="13" fill="#D6EEF2">IMG-3051 | Electromagnetics | EE-61001</text>
<circle class="accentFill" cx="260" cy="310" r="36" fill="none"/>
<circle class="accentFill" cx="700" cy="310" r="36" fill="none"/>
<text class="label" x="260" y="316" text-anchor="middle">q1</text>
<text class="label" x="700" y="316" text-anchor="middle">q2</text>
<line class="thin" x1="310" y1="310" x2="650" y2="310"/>
<line class="thin" x1="310" y1="270" x2="650" y2="270" marker-end="url(#arrow)"/>
<line class="thin" x1="650" y1="270" x2="310" y2="270" marker-end="url(#arrow)"/>
<text class="small" x="480" y="254" text-anchor="middle">separation r</text>
<line class="accent" x1="224" y1="310" x2="145" y2="310" marker-end="url(#arrow)"/>
<line class="accent" x1="736" y1="310" x2="815" y2="310" marker-end="url(#arrow)"/>
<text class="small" x="155" y="290" text-anchor="start">F on q1</text>
<text class="small" x="745" y="290" text-anchor="start">F on q2</text>
<text class="small" x="480" y="424" text-anchor="middle">equal and opposite forces along the line of centers</text>
<rect class="panel" x="24" y="500" width="912" height="74" rx="10"/>
<text x="48" y="522" font-family="Inter,Arial,sans-serif" font-size="14" fill="#1F2933">Two point charges, 8 uC and 6 uC, are separated by 0.5 m in air. Using k = 8.98755e9 N m^2/C^2, what is the</text>
