<text x="48" y="522" font-family="Inter,Arial,sans-serif" font-size="14" fill="#1F2933">An ideal buck converter operating in continuous-conduction mode at steady state has Vin = 36 V and duty cycle D</text>
<text x="48" y="541" font-family="Inter,Arial,sans-serif" font-size="14" fill="#1F2933">= 0.6. What is the output voltage?</text>
