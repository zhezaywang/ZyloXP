<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
<!-- LaTeX/TikZ source: latex_sources/IMG-7366.tex -->
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L8,3 z" fill="#174A5B"/>
</marker>
<style>
.wire{stroke:#174A5B;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.thin{stroke:#44606B;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.accent{stroke:#D97706;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.accentFill{fill:#FDECC8;stroke:#D97706;stroke-width:3}
.box{fill:#EAF4F4;stroke:#246B7A;stroke-width:3}
.panel{fill:#FFFFFF;stroke:#D9E2E7;stroke-width:1.5}
.soft{fill:#F1F7F8;stroke:#7AA8B2;stroke-width:2}
.label{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#1F2933}
.small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#52616B}
.tiny{font-family:Inter,Arial,sans-serif;font-size:11px;fill:#52616B}
.math{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#1F2933}
</style>
</defs>
<title id="title">Binary state count problem diagram</title>
<desc id="desc">How many unique states can 7 binary bits represent?</desc>
<rect x="0" y="0" width="960" height="600" fill="#F8FAFB"/>
<rect x="24" y="22" width="912" height="72" rx="10" fill="#174A5B"/>
<text x="48" y="56" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Binary state count problem diagram</text>
<text x="48" y="80" font-family="Inter,Arial,sans-serif" font-size="13" fill="#D6EEF2">IMG-7366 | Digital Logic | EE-147301</text>
<text class="small" x="110" y="188" text-anchor="start">n independent bits</text>
<rect class="soft" x="110" y="225" width="125" height="78" rx="8"/>
<rect class="soft" x="255" y="225" width="125" height="78" rx="8"/>
<rect class="soft" x="525" y="225" width="155" height="78" rx="8"/>
<text class="label" x="172" y="272" text-anchor="middle">bit 0</text>
<text class="label" x="317" y="272" text-anchor="middle">bit 1</text>
<text class="label" x="452" y="272" text-anchor="middle">...</text>
<text class="label" x="602" y="272" text-anchor="middle">bit n - 1</text>
<line class="wire" x1="680" y1="264" x2="760" y2="264" marker-end="url(#arrow)"/>
<rect class="accentFill" x="760" y="215" width="130" height="98" rx="8"/>
<text class="label" x="825" y="255" text-anchor="middle">2^n</text>
<text class="small" x="825" y="284" text-anchor="middle">unique states</text>
<text class="small" x="480" y="410" text-anchor="middle">Every added independent bit doubles the state count</text>
<rect class="panel" x="24" y="500" width="912" height="74" rx="10"/>
<text x="48" y="528" font-family="Inter,Arial,sans-serif" font-size="15" fill="#1F2933">How many unique states can 7 binary bits represent?</text>
</svg>
