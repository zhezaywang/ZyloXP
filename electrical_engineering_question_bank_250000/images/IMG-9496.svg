<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L8,3 z" fill="#174A5B"/>
</marker>
<style>
.wire{stroke:#174A5B;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.thin{stroke:#44606B;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.accent{stroke:#D97706;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.accentFill{fill:#FDECC8;stroke:#D97706;stroke-width:3}
.box{fill:#EAF4F4;stroke:#246B7A;stroke-width:3}
.panel{fill:#FFFFFF;stroke:#D9E2E7;stroke-width:1.5}
.soft{fill:#F1F7F8;stroke:#7AA8B2;stroke-width:2}
.label{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#1F2933}
.small{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#52616B}
.tiny{font-family:Inter,Arial,sans-serif;font-size:11px;fill:#52616B}
.math{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#1F2933}
</style>
</defs>
<title id="title">ADC LSB size problem diagram</title>
<desc id="desc">A 16-bit ADC uses a 10 V reference. What is one LSB? Use the ideal unipolar convention LSB = Vref/2^N.</desc>
<rect x="0" y="0" width="960" height="600" fill="#F8FAFB"/>
<rect x="24" y="22" width="912" height="72" rx="10" fill="#174A5B"/>
<text x="48" y="56" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">ADC LSB size problem diagram</text>
<text x="48" y="80" font-family="Inter,Arial,sans-serif" font-size="13" fill="#D6EEF2">IMG-9496 | Measurement and Instrumentation | EE-189901</text>
<line class="wire" x1="125" y1="305" x2="260" y2="305"/>
<rect class="box" x="260" y="240" width="160" height="130" rx="8"/>
<text class="label" x="316" y="310" text-anchor="start">ADC</text>
<line class="wire" x1="420" y1="305" x2="520" y2="305" marker-end="url(#arrow)"/>
<rect class="soft" x="520" y="225" width="250" height="160" rx="8"/>
<text class="label" x="604" y="210" text-anchor="start">digital code</text>
<line class="thin" x1="552" y1="270" x2="735" y2="270"/>
<line class="thin" x1="552" y1="295" x2="735" y2="295"/>
<line class="thin" x1="552" y1="320" x2="735" y2="320"/>
<line class="thin" x1="552" y1="345" x2="735" y2="345"/>
<text class="math" x="565" y="412" text-anchor="start">LSB = Vref / 2^N</text>
<text class="label" x="90" y="292" text-anchor="start">Vin</text>
<text class="small" x="273" y="452" text-anchor="start">Quantization step is set by reference and bit depth</text>
<rect class="panel" x="24" y="500" width="912" height="74" rx="10"/>
<text x="48" y="528" font-family="Inter,Arial,sans-serif" font-size="15" fill="#1F2933">A 16-bit ADC uses a 10 V reference. What is one LSB? Use the ideal unipolar convention LSB = Vref/2^N.</text>
</svg>
