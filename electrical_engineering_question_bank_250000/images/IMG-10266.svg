<title id="title">Trace propagation delay problem diagram</title>
<desc id="desc">A PCB trace is 6 inch long with delay 190 ps/in. What is the one-way propagation delay?</desc>
<rect x="0" y="0" width="960" height="600" fill="#F8FAFB"/>
<rect x="24" y="22" width="912" height="72" rx="10" fill="#174A5B"/>
<text x="48" y="56" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Trace propagation delay problem diagram</text>
<text x="48" y="80" font-family="Inter,Arial,sans-serif" font-size="13" fill="#D6EEF2">IMG-10266 | PCB Design and Signal Integrity | EE-205301</text>
<rect class="accentFill" x="145" y="225" width="670" height="42" rx="4"/>
<line class="accent" x1="175" y1="205" x2="785" y2="205" marker-end="url(#arrow)"/>
<text class="small" x="480" y="184" text-anchor="middle">signal current</text>
<text class="label" x="480" y="255" text-anchor="middle">trace length L</text>
<rect class="soft" x="115" y="390" width="730" height="44" rx="0"/>
<line class="wire" x1="785" y1="370" x2="175" y2="370" marker-end="url(#arrow)"/>
<text class="small" x="480" y="352" text-anchor="middle">return current</text>
<text class="label" x="480" y="422" text-anchor="middle">continuous reference plane</text>
<line class="thin" x1="175" y1="295" x2="785" y2="295"/>
<line class="thin" x1="175" y1="282" x2="175" y2="308"/>
<line class="thin" x1="785" y1="282" x2="785" y2="308"/>
<text class="small" x="480" y="324" text-anchor="middle">one-way delay: tpd = L x d</text>
<text class="small" x="480" y="464" text-anchor="middle">d is propagation delay per unit length</text>
<rect class="panel" x="24" y="500" width="912" height="74" rx="10"/>
<text x="48" y="528" font-family="Inter,Arial,sans-serif" font-size="15" fill="#1F2933">A PCB trace is 6 inch long with delay 190 ps/in. What is the one-way propagation delay?</text>
</svg>
